<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-box">

            <h2>
                Login
            </h2>

            <p class="subtitle">
                Welcome back to Tech Store
            </p>

            <form>

                <input
                type="email"
                placeholder="Enter Email">

                <input
                type="password"
                placeholder="Enter Password">

                <button class="login-btn">
                    Login
                </button>

                <div class="divider">
                    OR
                </div>

                <button
                type="button"
                class="google-btn">

                    Continue With Google

                </button>

            </form>

            <p class="bottom-text">

                Don't have an account?

                <a href="r.html">
                    Register
                </a>

            </p>

        </div>

    </div>

</body>

</html>
