<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="/style.css">
    <style>
      h1 {
        color: aquamarine
      }
      input {
        color: orange;
      }
    </style>
  </head>
  <body>
    <form action="">
      <h1 style="color: green">Hello</h1>
      <h1>Hii</h1>
      <label for="">ID</label>
      <input style="color: rgb(232, 232, 232); background-color: rgb(101, 17, 17);" type="text" value="2026" placeholder="Enter your ID" />
      <br />
      <label for="">Name</label>
      <br />
      <input type="text" placeholder="Enter your Name" />
      <br />
      <label for="">Marks</label>
      <br />
      <input type="number" placeholder="Enter your marks" />
      <br />
      <label for="">Email</label>
      <br />
      <input type="email" placeholder="Email" />
      <br />
      <label for="">Password</label>
      <br />
      <input type="password" placeholder="password" />
      <br />

      <!-- Radio -->
      <label for="">Gender:</label>
      <br />
      <input type="radio" />
      <label for="">Male</label>
      <input type="radio" />
      <label for="">Female</label>

      <hr />

      <!-- checkbox -->
      <label for="">Hobies:</label>
      <br />
      <input type="checkbox" />
      <label for="">cricket</label>

      <input type="checkbox" />
      <label for="">singing</label>

      <input type="checkbox" />
      <label for="">Cooking</label>
      <br />
      <hr />
      <!-- Date -->
      <label for="">Date of Birth</label>
      <br />
      <input type="date" />

      <br />
      <hr />

      <!-- Textarea -->
      <label for="">Address:</label>
      <br />
      <textarea rows="4" cols="30"></textarea>
      <br />
      <hr />
      <!-- File -->
      <label for="">Upload Marksheet:</label>
      <br />
      <input type="file" />
      <br /><br />

      <input type="submit" />
      <input type="" name="" id="" />
    </form>
  </body>
</html>
