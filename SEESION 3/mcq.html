<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Basics - Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --ruled: #d4c9b0;
    --accent: #c0392b;
    --green: #27ae60;
    --blue: #2c3e7a;
    --shadow: rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e0d0;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 30px 16px 60px;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      #ccc5b0 27px,
      #ccc5b0 28px
    );
  }

  .paper {
    max-width: 820px;
    margin: 0 auto;
    background: var(--paper);
    border-radius: 2px;
    padding: 48px 56px;
    box-shadow: 4px 4px 0 #bbb, 8px 8px 0 #ccc, 0 20px 60px rgba(0,0,0,0.25);
    position: relative;
  }



  .header {
    border-bottom: 3px double var(--ink);
    padding-bottom: 20px;
    margin-bottom: 32px;
  }

  .school-name {
    font-family: 'Merriweather', serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--blue);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Merriweather', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }

  .meta-row {
    display: flex;
    gap: 40px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .meta-item {
    font-size: 13px;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 3px;
    min-width: 140px;
  }

  .meta-item span {
    font-weight: 600;
    margin-right: 6px;
  }

  .instructions {
    background: #fff8e7;
    border-left: 4px solid var(--accent);
    padding: 12px 16px;
    font-size: 13.5px;
    margin-bottom: 36px;
    line-height: 1.7;
    border-radius: 0 4px 4px 0;
  }

  .instructions strong { color: var(--accent); }

  .section-title {
    font-family: 'Merriweather', serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--blue);
    border-bottom: 1px solid var(--ruled);
    padding-bottom: 6px;
    margin-bottom: 24px;
    margin-top: 8px;
  }

  .question-block {
    margin-bottom: 28px;
    padding-left: 8px;
  }

  .question-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .q-num {
    font-family: 'Merriweather', serif;
    color: var(--accent);
    margin-right: 6px;
    font-size: 14px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-left: 24px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 7px 12px;
    border-radius: 3px;
    font-size: 14.5px;
    line-height: 1.5;
    border: 1.5px solid transparent;
    transition: all 0.15s ease;
    user-select: none;
  }

  .option:hover {
    background: #ede8dc;
    border-color: var(--ruled);
  }

  .option input[type="radio"] {
    margin-top: 3px;
    accent-color: var(--blue);
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .option.correct {
    background: #e8f8ef;
    border-color: var(--green);
    color: #1a6b3c;
  }

  .option.wrong {
    background: #fdf0ef;
    border-color: var(--accent);
    color: #8b1a12;
    text-decoration: line-through;
  }

  .divider {
    border: none;
    border-top: 1px dashed var(--ruled);
    margin: 4px 0 28px;
  }

  .submit-row {
    text-align: center;
    margin-top: 40px;
    padding-top: 28px;
    border-top: 3px double var(--ink);
  }

  #submit-btn {
    font-family: 'Merriweather', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 14px 52px;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  #submit-btn:hover {
    background: var(--ink);
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--blue);
  }

  #submit-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  #result-box {
    display: none;
    margin-top: 28px;
    padding: 20px 28px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 2px;
    text-align: center;
    box-shadow: 4px 4px 0 var(--ink);
  }

  #result-box h2 {
    font-family: 'Merriweather', serif;
    font-size: 22px;
    margin-bottom: 8px;
  }

  #result-box p {
    font-size: 15px;
    color: #444;
    margin-bottom: 14px;
  }

  .score-big {
    font-family: 'Merriweather', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1;
    margin: 8px 0;
  }

  #retry-btn {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 8px 28px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    margin-top: 4px;
  }

  #retry-btn:hover { background: var(--accent); color: #fff; }

  .answered-note {
    font-size: 12px;
    color: #999;
    margin-top: 6px;
    padding-left: 24px;
    font-style: italic;
  }

  @media (max-width: 600px) {
    .paper { padding: 32px 22px 32px 32px; }
    .paper::before { left: 48px; }
    .meta-row { gap: 20px; }
  }
</style>
</head>
<body>

<div class="paper">
  <div class="header">
    <div class="school-name">Web Development — Class Test</div>
    <h1>HTML Fundamentals &nbsp;—&nbsp; Multiple Choice Quiz</h1>
    <!-- <div class="meta-row">
      <div class="meta-item"><span>Name:</span> ___________________</div>
      <div class="meta-item"><span>Roll No.:</span> __________</div>
      <div class="meta-item"><span>Date:</span> ___________</div>
      <div class="meta-item"><span>Marks:</span> &nbsp;/ 30</div>
    </div>
  </div> -->
<!-- 
  <div class="instructions">
    <strong>Instructions:</strong> Each question carries <strong>1 mark</strong>. Choose the <strong>one correct answer</strong> for each question. There is no negative marking. Attempt all questions.
  </div> -->

  <div class="section-title">Section A &mdash; Choose the Correct Answer</div>

  <div id="quiz-form"></div>

  <div class="submit-row">
    <button id="submit-btn" onclick="submitQuiz()">Submit Paper</button>
    <div id="result-box">
      <p>Your Score</p>
      <div class="score-big" id="score-display">0 / 30</div>
      <p id="result-msg"></p>
      <button id="retry-btn" onclick="retryQuiz()">Try Again</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    q: "What does HTML stand for?",
    opts: ["Hyper Text Markup Language", "High Transfer Markup Language", "Hyper Transfer Machine Language", "Home Tool Markup Language"],
    ans: 0
  },
  {
    q: "Who is the founder / inventor of HTML?",
    opts: ["Bill Gates", "Tim Berners-Lee", "Brendan Eich", "Mark Zuckerberg"],
    ans: 1
  },
  {
    q: "Which version of HTML is currently used?",
    opts: ["HTML 3", "HTML 4", "HTML 5", "HTML 6"],
    ans: 2
  },
  {
    q: "Which tag is called the ROOT of an HTML page?",
    opts: ["<head>", "<body>", "<html>", "<title>"],
    ans: 2
  },
  {
    q: "Which part of the HTML page is VISIBLE in the browser?",
    opts: ["<head>", "<title>", "<meta>", "<body>"],
    ans: 3
  },
  {
    q: "Which tag gives a NAME to the webpage that appears on the browser TAB?",
    opts: ["<header>", "<title>", "<h1>", "<label>"],
    ans: 1
  },
  {
    q: "The <head> tag is used for:",
    opts: ["Showing main content on the page", "Storing information ABOUT the page (metadata, title, CSS links)", "Creating headings", "Adding a navigation bar"],
    ans: 1
  },
  {
    q: "Which tag creates the LARGEST heading on a page?",
    opts: ["<h6>", "<h3>", "<h1>", "<big>"],
    ans: 2
  },
  {
    q: "Which tag creates the SMALLEST heading?",
    opts: ["<h1>", "<h4>", "<h5>", "<h6>"],
    ans: 3
  },
  {
    q: "What is the full form of CSS?",
    opts: ["Computer Style Sheets", "Cascading Style Sheets", "Coloring and Styling System", "Creative Style Syntax"],
    ans: 1
  },
  {
    q: "In the 'skeleton, decoration, life' analogy — what role does HTML play?",
    opts: ["Decoration", "Electric connections / life", "Skeleton / structure", "Server-side logic"],
    ans: 2
  },
  {
    q: "In the same analogy, JavaScript is compared to:",
    opts: ["Skeleton", "Decoration / paint", "Electric connections that bring life", "The browser"],
    ans: 2
  },
  {
    q: "When you type a URL in the browser, what happens FIRST?",
    opts: ["Browser renders the page", "Browser sends a request to the server", "CSS is loaded", "JavaScript runs"],
    ans: 1
  },
  {
    q: "After the server receives a request, what does it send back?",
    opts: ["Only images", "An email", "HTML (and related) files", "A PDF"],
    ans: 2
  },
  {
    q: "What is an HTML ATTRIBUTE?",
    opts: ["A CSS property", "Extra information provided inside an HTML tag", "A JavaScript function", "A type of HTML comment"],
    ans: 1
  },
  {
    q: "Which tag is used to insert an IMAGE on a webpage?",
    opts: ["<picture>", "<src>", "<image>", "<img>"],
    ans: 3
  },
  {
    q: "What is the use of the 'alt' attribute in the <img> tag?",
    opts: ["Sets the image size", "Provides alternate text if the image cannot be displayed", "Changes image color", "Adds a border to the image"],
    ans: 1
  },
  {
    q: "The <a> tag is called the _______ tag.",
    opts: ["Address", "Anchor", "Arrow", "Attribute"],
    ans: 1
  },
  {
    q: "What is the main use of the <a> tag?",
    opts: ["To add images", "To create hyperlinks / navigate to another page or URL", "To align text", "To animate elements"],
    ans: 1
  },
  {
    q: "What does 'href' stand for in the <a> tag?",
    opts: ["Hyper Reference", "Home Route", "Hyperlink Reference", "HTML Read File"],
    ans: 2
  },
  {
    q: "Which tag creates an UNORDERED (bulleted) list?",
    opts: ["<ol>", "<li>", "<ul>", "<list>"],
    ans: 2
  },
  {
    q: "Which tag creates an ORDERED (numbered) list?",
    opts: ["<ul>", "<ol>", "<nl>", "<li>"],
    ans: 1
  },
  {
    q: "Which tag is used for each item INSIDE a list?",
    opts: ["<item>", "<point>", "<bullet>", "<li>"],
    ans: 3
  },
  {
    q: "A list inside another list is called a:",
    opts: ["Double list", "Sub list", "Nested list", "Inner list"],
    ans: 2
  },
  {
    q: "Which tag creates a PARAGRAPH?",
    opts: ["<para>", "<pg>", "<p>", "<pr>"],
    ans: 2
  },
  {
    q: "Which tag inserts a LINE BREAK (moves text to the next line)?",
    opts: ["<break>", "<lb>", "<newline>", "<br>"],
    ans: 3
  },
  {
    q: "Which tag draws a HORIZONTAL LINE (divider) on the page?",
    opts: ["<line>", "<hl>", "<hr>", "<div>"],
    ans: 2
  },
  {
    q: "Which tag makes text BOLD (with visual importance / strong meaning)?",
    opts: ["<b>", "<i>", "<strong>", "Both <b> and <strong>"],
    ans: 3
  },
  {
    q: "Which tag makes text ITALIC (with emphasis / meaning)?",
    opts: ["<italic>", "<em>", "<i>", "Both <i> and <em>"],
    ans: 3
  },
  {
    q: "Which tag adds an UNDERLINE to text?",
    opts: ["<underline>", "<ul>", "<u>", "<un>"],
    ans: 2
  }
];

function escapeHTML(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function buildQuiz() {
  const form = document.getElementById('quiz-form');
  form.innerHTML = '';
  questions.forEach((item, idx) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q-block-${idx}`;

    const qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerHTML = `<span class="q-num">Q${idx + 1}.</span>${escapeHTML(item.q)}`;
    block.appendChild(qText);

    const opts = document.createElement('div');
    opts.className = 'options';

    item.opts.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'option';
      label.innerHTML = `
        <input type="radio" name="q${idx}" value="${oi}">
        <span>${String.fromCharCode(65 + oi)}) ${escapeHTML(opt)}</span>
      `;
      opts.appendChild(label);
    });

    block.appendChild(opts);

    if (idx < questions.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      block.appendChild(hr);
    }

    form.appendChild(block);
  });
}

function submitQuiz() {
  let score = 0;
  let unanswered = 0;

  questions.forEach((item, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const block = document.getElementById(`q-block-${idx}`);
    const allLabels = block.querySelectorAll('.option');
    const allRadios = block.querySelectorAll('input[type="radio"]');

    allRadios.forEach(r => r.disabled = true);

    if (!selected) {
      unanswered++;
      allLabels[item.ans].classList.add('correct');
    } else {
      const val = parseInt(selected.value);
      if (val === item.ans) {
        score++;
        allLabels[val].classList.add('correct');
      } else {
        allLabels[val].classList.add('wrong');
        allLabels[item.ans].classList.add('correct');
      }
    }
  });

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').style.opacity = '0.5';

  const resultBox = document.getElementById('result-box');
  resultBox.style.display = 'block';
  document.getElementById('score-display').textContent = `${score} / 30`;

  let msg = '';
  const pct = (score / 30) * 100;
  if (pct >= 90) msg = '🎉 Excellent! Outstanding performance!';
  else if (pct >= 70) msg = '👍 Good job! Keep it up!';
  else if (pct >= 50) msg = '📚 Average. Revise the topics again.';
  else msg = '⚠️ Needs improvement. Please study again carefully.';

  if (unanswered > 0) msg += ` (${unanswered} question${unanswered > 1 ? 's' : ''} left unanswered)`;

  document.getElementById('result-msg').textContent = msg;
  resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function retryQuiz() {
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').style.opacity = '1';
  document.getElementById('result-box').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
