<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Instagram Clone</title>

  <!-- <link rel="stylesheet" href="style.css"> -->

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">

    <div class="nav-container">

      <h2 class="logo">Instagram</h2>

      <input type="text" placeholder="Search" class="search-box">

      <div class="nav-icons">
        <i class="fas fa-home"></i>
        <i class="far fa-paper-plane"></i>
        <i class="far fa-heart"></i>

        <img src="https://i.pravatar.cc/40"
        class="profile">
      </div>

    </div>

  </header>

  <!-- Main -->
  <main class="main-container">

    <!-- Left Section -->
    <section class="feed">

      <!-- Stories -->
      <div class="stories">

        <div class="story">
          <img src="https://i.pravatar.cc/60?img=1">
        </div>

        <div class="story">
          <img src="https://i.pravatar.cc/60?img=2">
        </div>

        <div class="story">
          <img src="https://i.pravatar.cc/60?img=3">
        </div>

        <div class="story">
          <img src="https://i.pravatar.cc/60?img=4">
        </div>

        <div class="story">
          <img src="https://i.pravatar.cc/60?img=5">
        </div>

      </div>

      <!-- Post -->
      <div class="post">

        <div class="post-top">

          <div class="user">

            <img src="https://i.pravatar.cc/40?img=6">

            <div>
              <h4>Shubham</h4>
              <span>Patna, India</span>
            </div>

          </div>

          <i class="fas fa-ellipsis-h"></i>

        </div>

        <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200"
        class="post-image">

        <div class="post-actions">

          <div class="left-icons">
            <i class="far fa-heart"></i>
            <i class="far fa-comment"></i>
            <i class="far fa-paper-plane"></i>
          </div>

          <i class="far fa-bookmark"></i>

        </div>

        <p class="likes">1,024 likes</p>

        <p class="caption">
          <b>Shubham</b>
          Beautiful Nature 🌿
        </p>

        <p class="comments">
          View all 120 comments
        </p>

        <p class="time">
          2 HOURS AGO
        </p>

        <div class="add-comment">

          <input type="text"
          placeholder="Add a comment...">

          <button>Post</button>

        </div>

      </div>

    </section>

    <!-- Right Sidebar -->
    <aside class="sidebar">

      <h3>Suggestions For You</h3>

      <div class="suggestion">

        <div class="user">

          <img src="https://i.pravatar.cc/40?img=10">

          <div>
            <h4>Rahul</h4>
            <span>Follows you</span>
          </div>

        </div>

        <a href="#">Follow</a>

      </div>

      <div class="suggestion">

        <div class="user">

          <img src="https://i.pravatar.cc/40?img=11">

          <div>
            <h4>Aman</h4>
            <span>New to Instagram</span>
          </div>

        </div>

        <a href="#">Follow</a>

      </div>

    </aside>

  </main>

</body>
</html>
