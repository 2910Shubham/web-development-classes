<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        body{
            background-color: green;
            font-family: monospace;
            padding: 20px;
        }

        .card{
            background-color: bisque;
            width: 300px;
            border: 2px solid black;
            padding: 20px;
            margin: 40px;
            text-align: center;
            border-radius: 20px;
        }

        img{
            width: 100%;
            border-radius: 20px;
        }
        
        h2{
            margin-top: 5px;
            margin-left: 5px;
            margin-bottom: 5px;
        }

        .price{
            color: cornflowerblue;
            margin-bottom: 5px;
        }
        .abt{
            color: rgb(182, 88, 88)
        }

        button{
            margin-top: 10px;
            background-color: chocolate;
            padding: 10px;
            border: 2px solid cornflowerblue;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
      <img src="https://www.bing.com/th?id=OADD2.1179776008095319_1N247GB1RLFQFRR&pid=21.2&c=17&roil=0.0475&roit=0&roir=0.9966&roib=1&w=334&h=184&dynsize=1&qlt=90&dpr=1.50" alt="Product">
      <h2>Superhuman</h2>
      <p class="price">Price: Rs. 1,55,000</p>
      <p class="abt">Superhuman is a robotic device that will help people in there work</p>
      <button>Buy Now</button>
    </div>
</body>
</html>
