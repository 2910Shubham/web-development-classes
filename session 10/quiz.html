<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Basics - Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --ruled: #d4c9b0;
    --accent: #c0392b;
    --green: #27ae60;
    --blue: #2c3e7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e0d0;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 30px 16px 60px;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      #ccc5b0 27px,
      #ccc5b0 28px
    );
  }

  .paper {
    max-width: 820px;
    margin: 0 auto;
    background: var(--paper);
    border-radius: 2px;
    padding: 48px 56px;
    box-shadow: 4px 4px 0 #9f0606, 8px 8px 0 #ccc, 0 20px 60px rgba(0,0,0,0.25);
  }

  .header {
    border-bottom: 3px double var(--ink);
    padding-bottom: 20px;
    margin-bottom: 32px;
  }

  .school-name {
    font-family: 'Merriweather', serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--blue);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Merriweather', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }

  .meta-row {
    display: flex;
    gap: 40px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .meta-item {
    font-size: 13px;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 3px;
    min-width: 140px;
  }

  .meta-item span { font-weight: 600; margin-right: 6px; }

  .instructions {
    background: #fff8e7;
    border-left: 4px solid var(--accent);
    padding: 12px 16px;
    font-size: 13.5px;
    margin-bottom: 36px;
    line-height: 1.7;
    border-radius: 0 4px 4px 0;
  }

  .instructions strong { color: var(--accent); }

  .section-title {
    font-family: 'Merriweather', serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--blue);
    border-bottom: 1px solid var(--ruled);
    padding-bottom: 6px;
    margin-bottom: 24px;
    margin-top: 8px;
  }

  .question-block { margin-bottom: 28px; padding-left: 8px; }

  .question-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .q-num {
    font-family: 'Merriweather', serif;
    color: var(--accent);
    margin-right: 6px;
    font-size: 14px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-left: 24px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 7px 12px;
    border-radius: 3px;
    font-size: 14.5px;
    line-height: 1.5;
    border: 1.5px solid transparent;
    transition: all 0.15s ease;
    user-select: none;
  }

  .option:hover { background: #ede8dc; border-color: var(--ruled); }

  .option input[type="radio"] {
    margin-top: 3px;
    accent-color: var(--blue);
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .option.correct { background: #e8f8ef; border-color: var(--green); color: #1a6b3c; }
  .option.wrong   { background: #fdf0ef; border-color: var(--accent); color: #8b1a12; text-decoration: line-through; }

  .divider { border: none; border-top: 1px dashed var(--ruled); margin: 4px 0 28px; }

  .submit-row {
    text-align: center;
    margin-top: 40px;
    padding-top: 28px;
    border-top: 3px double var(--ink);
  }

  #submit-btn {
    font-family: 'Merriweather', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 14px 52px;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  #submit-btn:hover { background: var(--ink); transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--blue); }
  #submit-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  #result-box {
    display: none;
    margin-top: 28px;
    padding: 20px 28px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 2px;
    text-align: center;
    box-shadow: 4px 4px 0 var(--ink);
  }

  #result-box h2 { font-family: 'Merriweather', serif; font-size: 22px; margin-bottom: 8px; }
  #result-box p  { font-size: 15px; color: #444; margin-bottom: 14px; }

  .score-big {
    font-family: 'Merriweather', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1;
    margin: 8px 0;
  }

  #retry-btn {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 8px 28px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    margin-top: 4px;
  }

  #retry-btn:hover { background: var(--accent); color: #fff; }

  @media (max-width: 600px) {
    .paper { padding: 32px 22px; }
    .meta-row { gap: 20px; }
  }
</style>
</head>
<body>

<div class="paper">
  <div class="header">
    <div class="school-name">Web Development &mdash; Class Test</div>
    <h1>CSS &amp; HTML Forms &nbsp;&mdash;&nbsp; Multiple Choice Quiz</h1>

  <div class="instructions">
    <strong>Instructions:</strong> Each question carries <strong>1 mark</strong>. Choose the <strong>one correct answer</strong>. No negative marking. Attempt all questions.
  </div>

  <div class="section-title">Section A &mdash; Choose the Correct Answer</div>

  <div id="quiz-form"></div>

  <div class="submit-row">
    <button id="submit-btn" onclick="submitQuiz()">Submit Paper</button>
    <div id="result-box">
      <p>Your Score</p>
      <div class="score-big" id="score-display">0 / 30</div>
      <p id="result-msg"></p>
      <button id="retry-btn" onclick="retryQuiz()">Try Again</button>
    </div>
  </div>
</div>

<script>
const questions = [

  // ── CSS BASICS ──
  {
    q: "What does CSS stand for?",
    opts: ["Computer Style Sheets", "Cascading Style Sheets", "Creative Style Syntax", "Colorful Style System"],
    ans: 1
  },
  {
    q: "Which HTML tag is used to link an external CSS file to an HTML page?",
    opts: ["style", "script", "link", "css"],
    ans: 2
  },
  {
    q: "Where inside the HTML document should the link tag for CSS be placed?",
    opts: ["Inside the body tag", "Inside the head tag", "At the bottom of the page", "Inside the footer tag"],
    ans: 1
  },
  {
    q: "Which attribute in the link tag tells the browser the path to the CSS file?",
    opts: ["src", "type", "href", "url"],
    ans: 2
  },

  // ── BOX MODEL ──
  {
    q: "The CSS Box Model consists of which four parts (from inside to outside)?",
    opts: [
      "Content, Border, Padding, Margin",
      "Content, Padding, Border, Margin",
      "Margin, Border, Padding, Content",
      "Padding, Content, Margin, Border"
    ],
    ans: 1
  },
  {
    q: "Which CSS property controls the SPACE INSIDE an element, between the content and the border?",
    opts: ["margin", "spacing", "padding", "gap"],
    ans: 2
  },
  {
    q: "Which CSS property controls the SPACE OUTSIDE an element, between the element and other elements?",
    opts: ["padding", "margin", "border", "outline"],
    ans: 1
  },
  {
    q: "Which CSS property adds a LINE around an element?",
    opts: ["outline", "margin", "padding", "border"],
    ans: 3
  },
  {
    q: "Which of these is the correct way to write a border in CSS?",
    opts: [
      "border: red 2px solid",
      "border: 2px solid red",
      "border: solid red 2px",
      "border-style: 2px red solid"
    ],
    ans: 1
  },
  {
    q: "Which CSS property is used to make ROUNDED corners on an element?",
    opts: ["border-style", "border-curve", "border-round", "border-radius"],
    ans: 3
  },
  {
    q: "What does the CSS property 'width: 100%' mean?",
    opts: [
      "The element is 100 pixels wide",
      "The element takes the full width of its parent",
      "The element covers the full screen always",
      "The element cannot be resized"
    ],
    ans: 1
  },
  {
    q: "Which CSS property sets the BACKGROUND COLOR of an element?",
    opts: ["color", "bg-color", "background-color", "fill"],
    ans: 2
  },
  {
    q: "Which CSS property sets the COLOR OF TEXT inside an element?",
    opts: ["text-color", "font-color", "background-color", "color"],
    ans: 3
  },

  // ── COLORS ──
  {
    q: "Which of these is a valid way to write a COLOR VALUE in CSS?",
    opts: ["All of the below", "#ff0000", "rgb(255, 0, 0)", "red"],
    ans: 0
  },
  {
    q: "What does the hex color #ffffff represent?",
    opts: ["Black", "Red", "White", "Blue"],
    ans: 2
  },
  {
    q: "What does the hex color #000000 represent?",
    opts: ["White", "Black", "Grey", "Transparent"],
    ans: 1
  },
  {
    q: "In CSS, what does 'rgba(0, 0, 0, 0.5)' mean?",
    opts: [
      "Solid black color",
      "Black color with 50% transparency",
      "Grey color",
      "White color with 50% brightness"
    ],
    ans: 1
  },

  // ── TABLE ATTRIBUTES & PROPERTIES ──
  {
    q: "Which HTML attribute adds SPACE INSIDE each table cell (between content and cell wall)?",
    opts: ["cellspacing", "cellpadding", "padding", "border"],
    ans: 1
  },
  {
    q: "Which HTML attribute adds SPACE BETWEEN table cells?",
    opts: ["cellpadding", "gap", "cellspacing", "margin"],
    ans: 2
  },
  {
    q: "When you add a border to a table in HTML, you often see a DOUBLE BORDER. Which CSS property removes it and makes a single border?",
    opts: ["border-style: single", "border-collapse: collapse", "border-remove: double", "border-merge: true"],
    ans: 1
  },
  {
    q: "What value do you use with border-collapse to merge the double borders into one?",
    opts: ["merge", "single", "collapse", "remove"],
    ans: 2
  },

  // ── FORM INPUT TYPES ──
  {
    q: "Which input type allows the user to PICK A COLOR?",
    opts: ["type='picker'", "type='color'", "type='palette'", "type='rgb'"],
    ans: 1
  },
  {
    q: "Which input type lets the user UPLOAD A FILE from their computer?",
    opts: ["type='upload'", "type='document'", "type='attach'", "type='file'"],
    ans: 3
  },
  {
    q: "Which input type creates a SLIDER that the user can drag left or right?",
    opts: ["type='slider'", "type='drag'", "type='range'", "type='scroll'"],
    ans: 2
  },
  {
    q: "Which input type is used to enter a WEB ADDRESS (like https://google.com)?",
    opts: ["type='link'", "type='href'", "type='web'", "type='url'"],
    ans: 3
  },
  {
    q: "Which input type is NOT visible on the page but still sends data to the server?",
    opts: ["type='invisible'", "type='hidden'", "type='secret'", "type='none'"],
    ans: 1
  },
  {
    q: "Which input type creates a SEARCH BOX?",
    opts: ["type='find'", "type='query'", "type='search'", "type='lookup'"],
    ans: 2
  },
  {
    q: "Which input type lets the user select a MONTH AND YEAR (no day)?",
    opts: ["type='date'", "type='year'", "type='month'", "type='calendar'"],
    ans: 2
  },
  {
    q: "Which button CLEARS / RESETS all the values entered in a form?",
    opts: ["type='clear'", "type='delete'", "type='reset'", "type='empty'"],
    ans: 2
  },
  {
    q: "Which tag is used for a multi-line text input in a form (not a single-line input)?",
    opts: ["input type='multiline'", "textbox", "textarea", "input type='text' rows='4'"],
    ans: 2
  }

];

function escapeHTML(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function buildQuiz() {
  const form = document.getElementById('quiz-form');
  form.innerHTML = '';
  questions.forEach((item, idx) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q-block-${idx}`;

    const qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerHTML = `<span class="q-num">Q${idx + 1}.</span>${escapeHTML(item.q)}`;
    block.appendChild(qText);

    const opts = document.createElement('div');
    opts.className = 'options';

    item.opts.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'option';
      label.innerHTML = `
        <input type="radio" name="q${idx}" value="${oi}">
        <span>${String.fromCharCode(65 + oi)}) ${escapeHTML(opt)}</span>
      `;
      opts.appendChild(label);
    });

    block.appendChild(opts);

    if (idx < questions.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      block.appendChild(hr);
    }

    form.appendChild(block);
  });
}

function submitQuiz() {
  let score = 0;
  let unanswered = 0;

  questions.forEach((item, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const block = document.getElementById(`q-block-${idx}`);
    const allLabels = block.querySelectorAll('.option');
    const allRadios = block.querySelectorAll('input[type="radio"]');

    allRadios.forEach(r => r.disabled = true);

    if (!selected) {
      unanswered++;
      allLabels[item.ans].classList.add('correct');
    } else {
      const val = parseInt(selected.value);
      if (val === item.ans) {
        score++;
        allLabels[val].classList.add('correct');
      } else {
        allLabels[val].classList.add('wrong');
        allLabels[item.ans].classList.add('correct');
      }
    }
  });

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').style.opacity = '0.5';

  const resultBox = document.getElementById('result-box');
  resultBox.style.display = 'block';
  document.getElementById('score-display').textContent = `${score} / 30`;

  const pct = (score / 30) * 100;
  let msg = '';
  if (pct >= 90)      msg = '🎉 Excellent! Outstanding!';
  else if (pct >= 70) msg = '👍 Good job! Keep it up!';
  else if (pct >= 50) msg = '📚 Average. Revise the topics again.';
  else                msg = '⚠️ Needs improvement. Study again carefully.';

  if (unanswered > 0) msg += ` (${unanswered} question${unanswered > 1 ? 's' : ''} left unanswered)`;
  document.getElementById('result-msg').textContent = msg;
  resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function retryQuiz() {
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').style.opacity = '1';
  document.getElementById('result-box').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
