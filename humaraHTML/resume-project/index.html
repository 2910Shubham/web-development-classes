<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>

    <nav>

        <h2 class="logo">ShopEasy</h2>

            <li><a href="#">Products</a></li>

            <li><a href="#">Offers</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

        <button>Login</button>

    </nav>



    <!-- Hero Section -->

            <div class="card">

                <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=400">

    <footer>
