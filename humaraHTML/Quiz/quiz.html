<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Basics – Quiz 1 (New Batch)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --ruled: #d4c9b0;
    --accent: #c0392b;
    --green: #27ae60;
    --blue: #2c3e7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e0d0;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 30px 16px 60px;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 27px, #ccc5b0 27px, #ccc5b0 28px
    );
  }

  .paper {
    max-width: 820px;
    margin: 0 auto;
    background: var(--paper);
    border-radius: 2px;
    padding: 48px 56px;
    box-shadow: 4px 4px 0 #bbb, 8px 8px 0 #ccc, 0 20px 60px rgba(0,0,0,0.25);
  }

  .header {
    border-bottom: 3px double var(--ink);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }

  .school-name {
    font-family: 'Merriweather', serif;
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px;
    color: var(--blue); margin-bottom: 8px;
  }

  h1 {
    font-family: 'Merriweather', serif;
    font-size: 25px; font-weight: 700;
    color: var(--ink); line-height: 1.35;
  }

  .meta-row {
    display: flex; gap: 36px;
    margin-top: 16px; flex-wrap: wrap;
  }

  .meta-item {
    font-size: 13px; border-bottom: 1px solid var(--ink);
    padding-bottom: 3px; min-width: 140px;
  }
  .meta-item span { font-weight: 600; margin-right: 6px; }

  .instructions {
    background: #fff8e7;
    border-left: 4px solid var(--accent);
    padding: 12px 16px; font-size: 13.5px;
    margin-bottom: 32px; line-height: 1.7;
    border-radius: 0 4px 4px 0;
  }
  .instructions strong { color: var(--accent); }

  /* Topic section dividers */
  .topic-bar {
    background: var(--blue);
    color: #fff;
    font-family: 'Merriweather', serif;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 18px;
    margin-top: 10px;
    display: inline-block;
  }

  .section-title {
    font-family: 'Merriweather', serif;
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--blue);
    border-bottom: 1px solid var(--ruled);
    padding-bottom: 6px; margin-bottom: 22px;
  }

  .question-block { margin-bottom: 26px; padding-left: 8px; }

  .question-text {
    font-size: 15px; font-weight: 600;
    line-height: 1.6; margin-bottom: 10px; color: var(--ink);
  }

  .q-num {
    font-family: 'Merriweather', serif;
    color: var(--accent); margin-right: 6px; font-size: 14px;
  }

  .options {
    display: flex; flex-direction: column;
    gap: 6px; padding-left: 24px;
  }

  .option {
    display: flex; align-items: flex-start;
    gap: 10px; cursor: pointer;
    padding: 7px 12px; border-radius: 3px;
    font-size: 14.5px; line-height: 1.5;
    border: 1.5px solid transparent;
    transition: all 0.15s ease; user-select: none;
  }
  .option:hover { background: #ede8dc; border-color: var(--ruled); }

  .option input[type="radio"] {
    margin-top: 3px; accent-color: var(--blue);
    flex-shrink: 0; width: 16px; height: 16px; cursor: pointer;
  }

  .option.correct { background: #e8f8ef; border-color: var(--green); color: #1a6b3c; }
  .option.wrong   { background: #fdf0ef; border-color: var(--accent); color: #8b1a12; text-decoration: line-through; }

  .divider { border: none; border-top: 1px dashed var(--ruled); margin: 4px 0 26px; }

  .topic-divider {
    border: none; border-top: 2px solid var(--ruled);
    margin: 8px 0 28px;
  }

  .submit-row {
    text-align: center; margin-top: 40px;
    padding-top: 28px; border-top: 3px double var(--ink);
  }

  #submit-btn {
    font-family: 'Merriweather', serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 1.5px; background: var(--blue);
    color: #fff; border: none; padding: 14px 52px;
    cursor: pointer; border-radius: 2px;
    box-shadow: 3px 3px 0 var(--ink); transition: all 0.15s;
    text-transform: uppercase;
  }
  #submit-btn:hover { background: var(--ink); transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--blue); }
  #submit-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  #result-box {
    display: none; margin-top: 28px;
    padding: 20px 28px; background: #fff;
    border: 2px solid var(--ink); border-radius: 2px;
    text-align: center; box-shadow: 4px 4px 0 var(--ink);
  }
  #result-box p  { font-size: 15px; color: #444; margin-bottom: 14px; }
  .score-big {
    font-family: 'Merriweather', serif; font-size: 52px;
    font-weight: 700; color: var(--blue); line-height: 1; margin: 8px 0;
  }

  #retry-btn {
    font-size: 14px; font-weight: 600;
    background: transparent; color: var(--accent);
    border: 2px solid var(--accent); padding: 8px 28px;
    cursor: pointer; border-radius: 2px;
    transition: all 0.15s; margin-top: 4px;
    font-family: 'Source Sans 3', sans-serif;
  }
  #retry-btn:hover { background: var(--accent); color: #fff; }

  @media (max-width: 600px) {
    .paper { padding: 32px 22px; }
    .meta-row { gap: 20px; }
  }
</style>
</head>
<body>
<div class="paper">

  <div class="header">
    <div class="school-name">Web Development —&nbsp;|&nbsp; Quiz 1</div>
    <h1>HTML Fundamentals &nbsp;—&nbsp; Multiple Choice Quiz</h1>
  </div>

  <div class="instructions">
    <strong>Instructions:</strong> This quiz has <strong>35 questions</strong> worth <strong>1 mark each</strong>.
    Choose the <strong>one correct answer</strong> per question.
    No negative marking. Attempt all questions.
  </div>

  <div class="section-title">Section A &mdash; Choose the Correct Answer</div>

  <div id="quiz-form"></div>

  <div class="submit-row">
    <button id="submit-btn" onclick="submitQuiz()">Submit Paper</button>
    <div id="result-box">
      <p>Your Score</p>
      <div class="score-big" id="score-display">0 / 35</div>
      <p id="result-msg"></p>
      <button id="retry-btn" onclick="retryQuiz()">Try Again</button>
    </div>
  </div>

</div>

<script>
// topic: shown as a section heading above first question of each group
const questions = [

  // ══════════════════════════════════════
  //  WEB BASICS  (Q1 – Q7)
  // ══════════════════════════════════════
  {
    topic: "🌐  Web Basics & Introduction",
    q: "What is the INTERNET?",
    opts: [
      "A single website",
      "A global network of computers connected together",
      "A type of browser",
      "A programming language"
    ], ans: 1
  },
  {
    q: "What is a WEBSITE?",
    opts: [
      "A single web page",
      "A collection of related web pages under one domain",
      "An internet browser",
      "A type of server"
    ], ans: 1
  },
  {
    q: "What is a WEB PAGE?",
    opts: [
      "A folder on your computer",
      "A collection of all websites",
      "A single document/page that you view in a browser",
      "A browser application"
    ], ans: 2
  },
  {
    q: "What does HTML stand for?",
    opts: [
      "High Transfer Markup Language",
      "Hyper Text Makeup Language",
      "Hyper Text Markup Language",
      "Home Tool Markup Language"
    ], ans: 2
  },
  {
    q: "Who is the FOUNDER / INVENTOR of HTML?",
    opts: [
      "Bill Gates",
      "Mark Zuckerberg",
      "Brendan Eich",
      "Tim Berners-Lee"
    ], ans: 3
  },
  {
    q: "In web development, HTML is compared to which part of a HOUSE?",
    opts: [
      "The paint and colours",
      "The electrical wiring and lights",
      "The framework / skeleton / structure",
      "The furniture inside"
    ], ans: 2
  },
  {
    q: "In the house construction example, which technology is compared to PAINT & DECORATION?",
    opts: [
      "HTML",
      "CSS",
      "JavaScript",
      "Server"
    ], ans: 1
  },
  {
    q: "In the house construction example, which technology is compared to ELECTRICAL WIRING & LIGHTS?",
    opts: [
      "HTML",
      "CSS",
      "JavaScript",
      "Database"
    ], ans: 2
  },

  // ══════════════════════════════════════
  //  TAGS & ATTRIBUTES  (Q9 – Q13)
  // ══════════════════════════════════════
  {
    topic: "🏷️  Tags & Attributes",
    q: "What is an HTML TAG?",
    opts: [
      "A keyword surrounded by angle brackets < > used to define elements",
      "A CSS property",
      "A JavaScript function",
      "A folder on the server"
    ], ans: 0
  },
  {
    q: "Which of these is the correct syntax for an HTML tag?",
    opts: [
      "[h1] Heading [/h1]",
      "{h1} Heading {/h1}",
      "<h1> Heading </h1>",
      "(h1) Heading (/h1)"
    ], ans: 2
  },
  {
    q: "What is an HTML ATTRIBUTE?",
    opts: [
      "A CSS style rule",
      "Extra information given inside an opening tag to modify the element",
      "A JavaScript event",
      "A closing tag"
    ], ans: 1
  },
  {
    q: "Where is an attribute written in an HTML tag?",
    opts: [
      "Inside the closing tag",
      "After the closing tag",
      "Inside the opening tag",
      "Between the opening and closing tag"
    ], ans: 2
  },
  {
    q: "Which of the following is a correct example of an attribute?",
    opts: [
      "<p> color=red </p>",
      "<img src='photo.jpg'>",
      "<h1 /bold>",
      "<a> link </a>"
    ], ans: 1
  },

  // ══════════════════════════════════════
  //  HEADING TAGS  (Q14 – Q18)
  // ══════════════════════════════════════
  {
    topic: "📝  Heading Tags — H1 to H6",
    q: "How many heading tags are there in HTML?",
    opts: ["3", "4", "5", "6"],
    ans: 3
  },
  {
    q: "Which heading tag produces the LARGEST text?",
    opts: ["<h6>", "<h4>", "<h2>", "<h1>"],
    ans: 3
  },
  {
    q: "Which heading tag produces the SMALLEST text?",
    opts: ["<h1>", "<h3>", "<h5>", "<h6>"],
    ans: 3
  },
  {
    q: "Heading tags are numbered from H1 to H6. As the number INCREASES, the text size:",
    opts: [
      "Gets larger",
      "Stays the same",
      "Gets smaller",
      "Becomes bold only"
    ], ans: 2
  },
  {
    q: "Which tag would you use for the MAIN TITLE of a webpage?",
    opts: ["<h6>", "<h3>", "<h1>", "<title>"],
    ans: 2
  },

  // ══════════════════════════════════════
  //  TEXT FORMATTING TAGS  (Q19 – Q27)
  // ══════════════════════════════════════
  {
    topic: "✏️  Text Formatting Tags",
    q: "Which tag makes text BOLD?",
    opts: ["<i>", "<u>", "<b>", "<em>"],
    ans: 2
  },
  {
    q: "Which tag makes text ITALIC?",
    opts: ["<b>", "<i>", "<u>", "<strong>"],
    ans: 1
  },
  {
    q: "Which tag adds UNDERLINE to text?",
    opts: ["<b>", "<i>", "<u>", "<br>"],
    ans: 2
  },
  {
    q: "What is the difference between <b> and <strong>?",
    opts: [
      "They are completely different tags with no relation",
      "<b> makes text bold visually; <strong> also makes it bold but adds importance/meaning for SEO and screen readers",
      "<b> is for CSS; <strong> is for HTML",
      "<strong> makes text bigger; <b> makes text bold"
    ], ans: 1
  },
  {
    q: "What is the difference between <i> and <em>?",
    opts: [
      "<i> makes text italic visually; <em> also italicises but adds emphasis/meaning",
      "<em> is a CSS tag; <i> is an HTML tag",
      "<em> makes text bigger; <i> makes text italic",
      "There is no difference"
    ], ans: 0
  },
  {
    q: "Which tag inserts a LINE BREAK — moving content to the next line?",
    opts: ["<hr>", "<p>", "<break>", "<br>"],
    ans: 3
  },
  {
    q: "The <br> tag is called a _______ tag because it does not need a closing tag.",
    opts: ["Block", "Inline", "Self-closing / void", "Semantic"],
    ans: 2
  },
  {
    q: "Which tag draws a HORIZONTAL LINE across the page?",
    opts: ["<br>", "<hr>", "<hl>", "<line>"],
    ans: 1
  },
  {
    q: "What is the purpose of the <hr> tag?",
    opts: [
      "Creates a hyperlink",
      "Inserts a line break",
      "Draws a thematic / horizontal divider line",
      "Makes text bold"
    ], ans: 2
  },

  // ══════════════════════════════════════
  //  LISTS  (Q28 – Q35)
  // ══════════════════════════════════════
  {
    topic: "📋  HTML Lists",
    q: "Which tag creates an UNORDERED (bulleted) list?",
    opts: ["<ol>", "<dl>", "<ul>", "<li>"],
    ans: 2
  },
  {
    q: "Which tag creates an ORDERED (numbered) list?",
    opts: ["<ul>", "<ol>", "<dl>", "<list>"],
    ans: 1
  },
  {
    q: "Which tag is used for EACH ITEM inside an ordered or unordered list?",
    opts: ["<item>", "<point>", "<dt>", "<li>"],
    ans: 3
  },
  {
    q: "Which tag creates a DESCRIPTION LIST?",
    opts: ["<ul>", "<ol>", "<dl>", "<list>"],
    ans: 2
  },
  {
    q: "In a description list, which tag is used to write the TERM (the word being described)?",
    opts: ["<li>", "<dd>", "<dt>", "<term>"],
    ans: 2
  },
  {
    q: "In a description list, which tag is used to write the DESCRIPTION (definition of the term)?",
    opts: ["<li>", "<dt>", "<desc>", "<dd>"],
    ans: 3
  },
  {
    q: "A LIST INSIDE ANOTHER LIST is called a:",
    opts: ["Double list", "Sub-list", "Nested list", "Inner list"],
    ans: 2
  },
  {
    q: "How many types of lists are there in HTML?",
    opts: ["2", "3", "4", "5"],
    ans: 2
  }

];

function escapeHTML(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function buildQuiz() {
  const form = document.getElementById('quiz-form');
  form.innerHTML = '';

  questions.forEach((item, idx) => {
    // Topic bar (new section heading)
    if (item.topic) {
      if (idx > 0) {
        const td = document.createElement('hr');
        td.className = 'topic-divider';
        form.appendChild(td);
      }
      const bar = document.createElement('div');
      bar.className = 'topic-bar';
      bar.textContent = item.topic;
      form.appendChild(bar);
    }

    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q-block-${idx}`;

    const qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerHTML = `<span class="q-num">Q${idx + 1}.</span>${escapeHTML(item.q)}`;
    block.appendChild(qText);

    const opts = document.createElement('div');
    opts.className = 'options';

    item.opts.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'option';
      label.innerHTML = `
        <input type="radio" name="q${idx}" value="${oi}">
        <span>${String.fromCharCode(65 + oi)}) ${escapeHTML(opt)}</span>
      `;
      opts.appendChild(label);
    });

    block.appendChild(opts);

    // Divider between questions (not after last in section)
    const hr = document.createElement('hr');
    hr.className = 'divider';
    block.appendChild(hr);

    form.appendChild(block);
  });
}

function submitQuiz() {
  let score = 0, unanswered = 0;

  questions.forEach((item, idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const block = document.getElementById(`q-block-${idx}`);
    const allLabels = block.querySelectorAll('.option');
    const allRadios = block.querySelectorAll('input[type="radio"]');
    allRadios.forEach(r => r.disabled = true);

    if (!selected) {
      unanswered++;
      allLabels[item.ans].classList.add('correct');
    } else {
      const val = parseInt(selected.value);
      if (val === item.ans) {
        score++;
        allLabels[val].classList.add('correct');
      } else {
        allLabels[val].classList.add('wrong');
        allLabels[item.ans].classList.add('correct');
      }
    }
  });

  const total = questions.length;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').style.opacity = '0.5';

  const resultBox = document.getElementById('result-box');
  resultBox.style.display = 'block';
  document.getElementById('score-display').textContent = `${score} / ${total}`;

  const pct = (score / total) * 100;
  let msg = '';
  if (pct >= 90)      msg = '🎉 Excellent! Outstanding performance!';
  else if (pct >= 70) msg = '👍 Good job! Keep it up!';
  else if (pct >= 50) msg = '📚 Average. Revise the topics and try again.';
  else                msg = '⚠️ Needs improvement. Please study again carefully.';
  if (unanswered > 0) msg += ` (${unanswered} question${unanswered > 1 ? 's' : ''} unanswered)`;

  document.getElementById('result-msg').textContent = msg;
  resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function retryQuiz() {
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').style.opacity = '1';
  document.getElementById('result-box').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
