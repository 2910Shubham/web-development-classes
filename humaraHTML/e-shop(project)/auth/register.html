<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./auth.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>Create Account</h1>
            <p>Register and Start shopping</p>

            <form action="">
                <input type="text" placeholder="Full Name">
                <input type="tel" placeholder="Phone Number">
                <input type="e-mail" placeholder="Enter you E-Mail">
                <input type="password" placeholder="Enter a strong password">
                <input type="password" placeholder="Confirm Password">

                <button type="submit">Register</button>
            </form>

            <p class="bottom-txt">Already have an account? <a href="./login.html">Login</a></p>
        </div>
    </div>
</body>
</html>
